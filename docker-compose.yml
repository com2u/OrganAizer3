# Explicit project name so this stack stays isolated from the pre-existing
# "organaizer" production stack on the server (avoids orphan-container clashes).
name: terminlandschaft

services:
  organaizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: organaizer:latest
    container_name: OrganAIzer
    restart: unless-stopped
    # All system configuration comes from the .env file on the host
    env_file:
      - .env
    ports:
      # Host:Container - both driven by WEB_PORT from .env
      - "${WEB_PORT:-4815}:${WEB_PORT:-4815}"
    volumes:
      # Database & imported data live on the host and are mounted in
      - ./data:/app/data
      # Configuration lives on the host and is mounted in (read-only)
      - ./.env:/app/.env:ro
      # Persist logs on the host
      - ./log.txt:/app/log.txt
      # Obsidian vault directory (all user vaults; access is enforced per-user in the app)
      # SECURITY: Do NOT mount to /app/obsidian/<user> – user isolation is enforced
      # by the application via OBSIDIAN_ROOT + authenticated email containment check.
      - /home/hermes/obsidian:/app/obsidian
    # Reach the host-networked voice stack (voice-web control API on :2300).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      supabase-db:
        condition: service_healthy

  # ===== Supabase data platform (database + REST API) =====
  # PostgreSQL is never published on a public host interface. The application
  # and migration CLI reach it only through the private Compose network.
  supabase-db:
    image: supabase/postgres:17.6.1.136
    container_name: organaizer-supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUPABASE_DB_NAME:-postgres}
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD}
    volumes:
      - ./data/supabase-db:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U postgres -d ${SUPABASE_DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  supabase-rest:
    image: postgrest/postgrest:v14.12
    container_name: organaizer-supabase-rest
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${SUPABASE_DB_PASSWORD}@supabase-db:5432/${SUPABASE_DB_NAME:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_MAX_ROWS: 1000
      PGRST_SERVER_PORT: 3000
    # Administrative access is intentionally bound to localhost only.
    ports:
      - "127.0.0.1:${SUPABASE_REST_PORT:-3002}:3000"

  # ===== n8n – Workflow Automation =====
  # Local n8n instance for the OrganAIzer n8n integration.
  # Auto-starts with the stack, UI accessible on port 5678.
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      # Run in "public" mode so the editor is accessible without signup
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      # Allow iframe embedding from OrganAIzer
      - N8N_SECURE_COOKIE=false
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
    ports:
      - "5678:5678"
    volumes:
      # Persist n8n workflows and credentials on the host
      - ./n8n_data:/home/node/.n8n

  # ===================================================================
  # ===== Telephony / Voice stack (merged from the VoiceClient app) ====
  # ===================================================================
  # Redis + LiveKit + LiveKit SIP + AI agent worker + web/token server.
  # Host networking is required so SIP (5060), RTP/WebRTC media port ranges
  # and public-IP detection work on a single Linux server. Ports used:
  #   LiveKit 7880/7881, SIP 5060, RTP 10000-20000, WebRTC 50000-50200,
  #   Redis 6379 (localhost only), agent health 8090, web/token server 2300.
  # These do not collide with OrganAIzer (4815) or n8n (5678).
  # All telephony settings/secrets are managed via the Telefonie page and
  # persisted in ./data/telephony.env (shared with these services).

  redis:
    image: redis:7-alpine
    container_name: organaizer-redis
    network_mode: host
    restart: unless-stopped
    command:
      ["redis-server", "--bind", "127.0.0.1", "--appendonly", "yes"]
    volumes:
      # Persist SIP trunks, dispatch rules and LiveKit coordination state.
      - ./data/redis:/data

  livekit:
    image: livekit/livekit-server:latest
    container_name: organaizer-livekit
    network_mode: host
    restart: unless-stopped
    depends_on: [redis]
    command: ["--config", "/etc/livekit/livekit.yaml"]
    volumes:
      - ./voice/livekit.yaml:/etc/livekit/livekit.yaml:ro

  livekit-sip:
    image: livekit/sip:latest
    container_name: organaizer-livekit-sip
    network_mode: host
    restart: unless-stopped
    depends_on: [redis, livekit]
    command: ["--config", "/etc/livekit/sip.yaml"]
    volumes:
      - ./voice/sip.yaml:/etc/livekit/sip.yaml:ro

  voice-agent:
    build:
      context: ./voice
      dockerfile: Dockerfile
    image: organaizer-voice:latest
    container_name: organaizer-voice-agent
    network_mode: host
    restart: unless-stopped
    depends_on: [livekit]
    env_file:
      # Supplies the protected Hermes API credentials from the target host.
      - .env
    environment:
      - LIVEKIT_URL=ws://localhost:7880
      - OBSIDIAN_ROOT=/app/obsidian
    volumes:
      # Shared, persisted config + phonebook (telephony.env managed via the UI).
      - ./data:/app/data
      # Obsidian vault (read-only) so the agent can use it as knowledge base.
      - /home/hermes/obsidian:/app/obsidian:ro
    command: ["python", "-m", "app.agent", "start"]

  voice-web:
    image: organaizer-voice:latest
    container_name: organaizer-voice-web
    network_mode: host
    restart: unless-stopped
    depends_on: [livekit, voice-agent]
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=ws://localhost:7880
      # Public wss URL handed to browser Dialog clients is taken from the
      # Telefonie config (data/telephony.env -> LIVEKIT_PUBLIC_URL), so it is
      # not hard-coded here. It must be a TLS (wss://) endpoint that reverse-
      # proxies to LiveKit's /rtc, because the app is served over HTTPS.
      # Bind the control/token server on all interfaces so the control plane
      # (OrganAIzer backend) and browsers can reach it.
      - SERVER_HOST=0.0.0.0
    volumes:
      - ./data:/app/data
      - /home/hermes/obsidian:/app/obsidian:ro
    command: ["python", "-m", "app.web_server"]
