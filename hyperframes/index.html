<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrganAIzer HyperFrames</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #09090b; color: #fafafa; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #organaizer-intro { width: 100%; height: 100%; display: grid; place-items: center; overflow: hidden; background: radial-gradient(circle at 70% 20%, #27272a, #09090b 60%); }
      .scene-content { width: 100%; height: 100%; box-sizing: border-box; padding: 120px 160px; display: flex; flex-direction: column; justify-content: center; gap: 22px; }
      h1 { margin: 0; max-width: 1200px; font-size: 104px; line-height: .98; letter-spacing: -.055em; }
      p { margin: 0; color: #a1a1aa; font-size: 36px; }
      .accent { width: 160px; height: 8px; border-radius: 9999px; background: #fafafa; }
    </style>
  </head>
  <body>
    <div id="organaizer-intro" data-composition-id="organaizer-intro" data-width="1920" data-height="1080" data-start="0">
      <section id="intro-scene" class="scene-content clip" data-start="0" data-duration="6" data-track-index="1">
        <div class="accent"></div>
        <h1>Videos direkt in OrganAIzer gestalten.</h1>
        <p>HyperFrames · HTML als kreative Quelle</p>
      </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from(".accent", { scaleX: 0, transformOrigin: "left", duration: .5, ease: "power3.out" }, 0);
      tl.from("h1", { y: 60, opacity: 0, duration: .7, ease: "power3.out" }, .15);
      tl.from("p", { y: 35, opacity: 0, duration: .55, ease: "power2.out" }, .35);
      window.__timelines["organaizer-intro"] = tl;
    </script>
  </body>
</html>
