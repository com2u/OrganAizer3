<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <style>
    .fg { fill: #18181b; }
    @media (prefers-color-scheme: dark) { .fg { fill: #fafafa; } }
  </style>
  <mask id="logo" maskUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
    <image width="256" height="256" href="data:image/png;base64,"/>
  </mask>
  <rect class="fg" width="256" height="256" mask="url(#logo)"/>
</svg>
