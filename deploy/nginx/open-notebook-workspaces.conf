# OrganAIzer optional workspaces behind the existing TLS host.
location /slidev/ {
  auth_basic "OrganAIzer Slidev";
  auth_basic_user_file /data/nginx/custom/organaizer-workspaces.htpasswd;
  proxy_pass http://slidev:3030;
  proxy_http_version 1.1;
  proxy_set_header Host localhost:3030;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_hide_header X-Frame-Options;
  add_header Content-Security-Policy "frame-ancestors https://organaizer.app" always;
}

location /n8n/ {
  proxy_pass http://n8n:5678;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_hide_header X-Frame-Options;
  add_header Content-Security-Policy "frame-ancestors https://organaizer.app" always;
}
