# OrganAIzer optional workspaces behind the existing TLS host.
location /slidev/ {
  auth_request /workspace-auth/slidev;
  proxy_pass http://slidev:3030;
  proxy_http_version 1.1;
  proxy_set_header Host localhost:3030;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_hide_header X-Frame-Options;
  add_header Content-Security-Policy "frame-ancestors https://organaizer.app" always;
}

location = /workspace-login/slidev {
  access_log off;
  proxy_pass http://organaizer:4815/api/workspace-auth/login/slidev$is_args$args;
  proxy_set_header Host $host;
}

location = /workspace-auth/slidev {
  internal;
  proxy_pass http://organaizer:4815/api/workspace-auth/check/slidev;
  proxy_pass_request_body off;
  proxy_set_header Content-Length "";
  proxy_set_header Cookie $http_cookie;
}

location /n8n/ {
  proxy_pass http://n8n:5678;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_hide_header X-Frame-Options;
  add_header Content-Security-Policy "frame-ancestors https://organaizer.app" always;
}
