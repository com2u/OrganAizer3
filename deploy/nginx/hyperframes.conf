server {
  listen 80;
  listen [::]:80;
  server_name hyperframes.ai-server.org;
  include conf.d/include/letsencrypt-acme-challenge.conf;
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name hyperframes.ai-server.org;
  ssl_certificate /etc/letsencrypt/live/hyperframes.ai-server.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hyperframes.ai-server.org/privkey.pem;
  include conf.d/include/ssl-ciphers.conf;

  location = /workspace-login/hyperframes {
    access_log off;
    proxy_pass http://organaizer:4815/api/workspace-auth/login/hyperframes$is_args$args;
    proxy_set_header Host $host;
  }
  location = /workspace-auth/hyperframes {
    internal;
    proxy_pass http://organaizer:4815/api/workspace-auth/check/hyperframes;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
  }
  location / {
    auth_request /workspace-auth/hyperframes;
    proxy_pass http://hyperframes:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_hide_header X-Frame-Options;
    add_header Content-Security-Policy "frame-ancestors https://organaizer.app" always;
  }
}
